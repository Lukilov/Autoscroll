<!doctype html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cela ulica nori - AutoScroll</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="controls" role="region" aria-label="Auto scroll kontrole">
    <a class="back exit" href="index.html">X</a>
    <label>
      Min
      <input id="minutes" type="number" min="0" value="2" />
    </label>
    <label>
      Sek
      <input id="seconds" type="number" min="0" max="59" value="30" />
    </label>
    <button id="startBtn" type="button">Start</button>
    <button id="pauseBtn" type="button">Pavza</button>
    <button id="resetBtn" type="button">Reset</button>
    <div class="nav-actions" aria-label="Navigacija pesmi">
      <a class="back" href="dez-naj-pada.html">Prejšnja</a>
      <a class="back" href="lagala-nas-mala.html">Naslednja</a>
    </div>
  </header>

  <main class="lyrics" id="lyrics">
    <h1 class="song-title">Cela ulica nori</h1>
    <p class="song-note">Banka 2, register 4.</p>
    <section class="lyrics-stack" aria-label="Cela ulica nori v slikah">
      <img src="Pesmi/celaulica1.png" alt="Cela ulica nori 1" />
      <img src="Pesmi/celaulica2.png" alt="Cela ulica nori 2" />
      <img src="Pesmi/celaulica3.png" alt="Cela ulica nori 3" />
      <img src="Pesmi/celaulica4.png" alt="Cela ulica nori 4" />
      <img src="Pesmi/celaulica5.png" alt="Cela ulica nori 5" />
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
