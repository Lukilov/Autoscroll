<!doctype html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tople oči - AutoScroll</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="controls" role="region" aria-label="Auto scroll kontrole">
    <a class="back exit" href="index.html">X</a>
    <label>
      Min
      <input id="minutes" type="number" min="0" value="2" />
    </label>
    <label>
      Sek
      <input id="seconds" type="number" min="0" max="59" value="30" />
    </label>
    <button id="startBtn" type="button">Start</button>
    <button id="pauseBtn" type="button">Pavza</button>
    <button id="resetBtn" type="button">Reset</button>
    <div class="nav-actions" aria-label="Navigacija pesmi">
      <a class="back" href="le-s-teboj.html">Prejšnja</a>
      <a class="back" href="nisem-vazna.html">Naslednja</a>
    </div>
  </header>

  <main class="lyrics" id="lyrics">
    <h1 class="song-title">Tople oči</h1>
    <p class="song-note">Pol tona dol.</p>
    <section class="lyrics-stack" aria-label="Tople oči v slikah">
      <img src="Pesmi/topleoci1.png" alt="Tople oči 1" />
      <img src="Pesmi/topleoci2.png" alt="Tople oči 2" />
      <img src="Pesmi/topleoci3.png" alt="Tople oči 3" />
      <img src="Pesmi/topleoci4.png" alt="Tople oči 4" />
      <img src="Pesmi/topleoci5.png" alt="Tople oči 5" />
      <img src="Pesmi/topleoci6.png" alt="Tople oči 6" />
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
