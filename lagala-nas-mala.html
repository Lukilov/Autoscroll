<!doctype html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lagala nas mala - AutoScroll</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="controls" role="region" aria-label="Auto scroll kontrole">
    <a class="back exit" href="index.html">X</a>
    <label>
      Min
      <input id="minutes" type="number" min="0" value="2" />
    </label>
    <label>
      Sek
      <input id="seconds" type="number" min="0" max="59" value="30" />
    </label>
    <button id="startBtn" type="button">Start</button>
    <button id="pauseBtn" type="button">Pavza</button>
    <button id="resetBtn" type="button">Reset</button>
    <div class="nav-actions" aria-label="Navigacija pesmi">
      <a class="back" href="cela-ulica-nori.html">Prejšnja</a>
      <a class="back" href="cao-lepa.html">Naslednja</a>
    </div>
  </header>

  <main class="lyrics" id="lyrics">
    <h1 class="song-title">Lagala nas mala</h1>
    <p class="song-note">Banka 2, številka 5.</p>
    <section class="lyrics-stack" aria-label="Lagala nas mala v slikah">
      <img src="Pesmi/lagalanasmala1.png" alt="Lagala nas mala 1" />
      <img src="Pesmi/lagalanasmala2.png" alt="Lagala nas mala 2" />
      <img src="Pesmi/lagalanasmala3.png" alt="Lagala nas mala 3" />
      <img src="Pesmi/lagalanasmala4.png" alt="Lagala nas mala 4" />
      <img src="Pesmi/lagalanasmala5.png" alt="Lagala nas mala 5" />
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
